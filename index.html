<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web2APK Creator</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #111;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            width: 90%;
            max-width: 400px;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background: #fff;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Web to APK</h2>
        <input type="text" id="appName" placeholder="Nama Aplikasi">
        <input type="url" id="webUrl" placeholder="https://link-website.com">
        <p style="font-size: 12px; color: #888;">Pilih Ikon Aplikasi (PNG):</p>
        <input type="file" id="appIcon" accept="image/*">
        <button onclick="build()">Generate Konfigurasi</button>
    </div>

    <script>
        function build() {
            const name = document.getElementById('appName').value;
            const url = document.getElementById('webUrl').value;
            if(!name || !url) return alert("Isi semua bro!");
            alert("Konfigurasi " + name + " siap. Upload ke GitHub untuk Build!");
        }
    </script>
</body>
</html>
